name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  composer-install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer

      - uses: actions/cache@v5
        id: vendor-cache
        with:
          path: vendor/
          key: vendor-${{ hashFiles('composer.lock') }}

      - if: steps.vendor-cache.outputs.cache-hit != 'true'
        run: composer install --prefer-dist --no-interaction --no-progress --no-scripts --ignore-platform-reqs

  pint:
    runs-on: ubuntu-latest
    needs: composer-install
    steps:
      - uses: actions/checkout@v6

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - uses: actions/cache@v5
        with:
          path: vendor/
          key: vendor-${{ hashFiles('composer.lock') }}

      - run: ./vendor/bin/pint --test

  phpstan:
    runs-on: ubuntu-latest
    needs: composer-install
    steps:
      - uses: actions/checkout@v6

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - uses: actions/cache@v5
        with:
          path: vendor/
          key: vendor-${{ hashFiles('composer.lock') }}

      - run: ./vendor/bin/phpstan analyse --memory-limit=512M

  phpunit:
    runs-on: ubuntu-latest
    needs: composer-install

    services:
      pgsql:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: testing
          POSTGRES_USER: sail
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      APP_ENV: testing
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: testing
      DB_USERNAME: sail
      DB_PASSWORD: password
      XDEBUG_MODE: coverage

    steps:
      - uses: actions/checkout@v6

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo, pdo_pgsql, xdebug
          coverage: xdebug

      - uses: actions/cache@v5
        with:
          path: vendor/
          key: vendor-${{ hashFiles('composer.lock') }}

      - run: ./vendor/bin/phpunit --coverage-text --colors=never --coverage-cobertura=coverage.cobertura.xml

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage
          path: coverage.cobertura.xml
          retention-days: 1
